defaults:
  - ../config/traj_envs@_here_
  - ../config/deepspeed_zero@_here_
  - ../config/deepspeed_zero2@_here_
  - ../config/deepspeed_zero3@_here_
  - ../config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

# pipeline_cls: roll.pipeline.agentic.agentic_multi_lora_pipeline.AgenticMultiLoraPipeline
track_with: stdout


exp_name: "agent_train_sokoban_multi_lora2"
seed: 42
logging_dir: ./output/lora_pipeline2/logs
output_dir: ./output/lora_pipeline2
render_save_dir: /tmp/roll_output/lora_pipeline2/render


system_envs:
  USE_MODELSCOPE: "0"
  NCCL_SHM_DISABLE: "1"
  RAY_PROFILING: "1"
  RAY_DEDUP_LOGS: "0"
  RAY_TMPDIR: "${oc.env:RAY_TMPDIR,/tmp}"
  ROLL_TIMEOUT_SCALE: "0.1"
  ROLL_GPU_REQUEST_TIMEOUT_S: "120"
  ROLL_NOTIFY_READY_TIMEOUT_S: "300"
  ROLL_VERIFY_OFFLOAD_GPU_MEMORY: "1"
  ROLL_SELECTIVE_MODEL_UPDATE_PG_TIMEOUT_S: "150"
  ROLL_ROLLOUT_GET_BATCH_TIMEOUT_S: "180"
  ROLL_LOG_PARTIAL_GPU_OPS: "1"
  ROLL_DEBUG_LORA_ROUTING: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  RAY_grpc_server_thread_pool_size: "4"
  TORCHINDUCTOR_COMPILE_THREADS: "1"
  TORCHINDUCTOR_MAX_AUTOTUNE: "0"

checkpoint_config:
  type: file_system
  output_dir: /tmp/roll_output/multi_lora1/checkpoints

num_gpus_per_node: 2
model_download_type: HUGGINGFACE_HUB
offload_nccl: true
max_steps: 3
model_update_buffer_size_mb: 100  # Limit broadcast bucket to 100 MB to avoid OOM with co-located infer workers
save_steps: 10000
logging_steps: 1
eval_steps: 20
resume_from_checkpoint: false

async_generation_ratio: 1

rollout_batch_size: 4
val_batch_size: 4
sequence_length: 1024  # Reduced from 2048: Sokoban max_new_tokens=64 needs ~500 tokens max, halves peak activation memory
max_actions_per_traj: 5

advantage_clip: 0.2
ppo_epochs: 1
adv_estimator: "grpo"
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

pretrain: Qwen/Qwen2.5-0.5B-Instruct
reward_pretrain: Qwen/Qwen2.5-0.5B-Instruct

actor_train:
  offload_nccl: ${offload_nccl}
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
    adapters:
      Sokoban3:
        lora_target: all-linear
        lora_rank: 8
        lora_alpha: 8
      Sokoban4:
        lora_target: all-linear
        lora_rank: 8
        lora_alpha: 8
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 2
    warmup_steps: 1
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: false
      lora_optimizer_mode: per_adapter
      recompute_granularity: full
      sequence_parallel: true
      overlap_grad_reduce: false # Per-adapter LoRA mode requires overlap_grad_reduce disabled to avoid grad-sync hang.
  # Note: use_sequence_packing is NOT enabled here — sequence packing mixes sequences from different
  # LoRA adapters into one microbatch, violating the adapter-homogeneity constraint in inner_forward_step.
  # Note: use_dynamic_batching_in_train is also NOT enabled — incompatible with lora_optimizer_mode=per_adapter.
  device_mapping: "[1, ]"
  infer_batch_size: 1

actor_infer:
  offload_nccl: ${offload_nccl}
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
    adapters:
      Sokoban3:
        lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
        lora_rank: 8
        lora_alpha: 8
      Sokoban4:
        lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
        lora_rank: 8
        lora_alpha: 8
  generating_args:
    max_new_tokens: 64
    top_p: 1
    top_k: 3
    num_beams: 1
    temperature: 0.0
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      VLLM_USE_V1: 1
      gpu_memory_utilization: 0.6 # Raise cache budget so vLLM has non-zero KV blocks during two-worker startup.
      block_size: 16
      load_format: auto
      tensor_parallel_size: 1
      max_num_batched_tokens: 1024  # Match reduced sequence_length=1024
      max_num_seqs: 2
      enforce_eager: true
      sleep_level: 2  # SchedRL requires sleep_level=2 for weight offload (ENG-123 Phase 3 guard in adapter init).
  device_mapping: "[0, 1, ]"

reference:
  offload_nccl: ${offload_nccl}
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
  # Dynamic batching on reference (megatron_infer): trims padding per-microbatch to actual token length
  # (rounded to sequence_length_round_in_infer). Reduces peak memory during log_prob computation.
  use_dynamic_batching_in_infer: true
  max_tokens_per_microbatch_in_infer: 1024  # Match reduced sequence_length=1024
  sequence_length_round_in_infer: 8
  device_mapping: "[1, ]"
  infer_batch_size: 1

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 4
  num_env_groups: 2
  group_size: 2
  tags: [Sokoban3, Sokoban4]
  num_groups_partition: [1, 1]

val_env_manager:
  max_env_num_per_worker: 4
  num_env_groups: 2
  group_size: 2
  tags: [Sokoban3, Sokoban4]
  num_groups_partition: [1, 1]

max_tokens_per_step: 64

custom_envs:
  Sokoban3:
    ${custom_env.SimpleSokoban}
  Sokoban4:
    ${custom_env.SimpleSokoban}
